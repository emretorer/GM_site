name: Deploy to GCE VM

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: app
        run: npm install

      - name: Build
        working-directory: app
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy dist (scp)
        run: |
          # Clean target directory (keep directory itself)
          ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}' && find '${{ secrets.DEPLOY_PATH }}' -mindepth 1 -maxdepth 1 -exec rm -rf {} +"

          # Upload build output, including dotfiles such as .htaccess
          scp -P ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519 -r \
            app/dist/. \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/
